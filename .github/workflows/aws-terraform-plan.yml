name: aws-terraform-plan

on:
  pull_request:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/aws-terraform-plan.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Terraform workspace/environment'
        required: true
        default: 'dev'

env:
  TF_IN_AUTOMATION: true

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build Lambda zip packages
        run: ./scripts/build_lambda_packages.sh

      - name: Configure AWS credentials (OIDC role)
        if: ${{ secrets.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Configure AWS credentials (access keys fallback)
        if: ${{ secrets.AWS_ROLE_TO_ASSUME == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform workspace
        working-directory: infra/terraform
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          terraform workspace select "$ENV_NAME" || terraform workspace new "$ENV_NAME"

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: infra/terraform
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          TF_VAR_rds_password: ${{ secrets.RDS_PASSWORD }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
          TF_VAR_lambda_api_package: ../../dist/lambda_api.zip
          TF_VAR_lambda_worker_package: ../../dist/lambda_worker.zip
          TF_VAR_lambda_export_package: ../../dist/lambda_export.zip
        run: terraform plan -input=false
