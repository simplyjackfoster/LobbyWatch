<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>

    <!-- Node glows -->
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a6bc4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a6bc4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2da44e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2da44e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>

    <!-- Edge gradients -->
    <linearGradient id="edge1" x1="720" y1="195" x2="1020" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c41a1a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c41a1a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="edge2" x1="895" y1="148" x2="1020" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c41a1a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c41a1a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="edge3" x1="848" y1="336" x2="968" y2="415" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c41a1a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c41a1a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="edge4" x1="618" y1="345" x2="968" y2="415" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c41a1a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c41a1a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="edge5" x1="1020" y1="250" x2="1098" y2="368" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c41a1a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c41a1a" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="edge6" x1="968" y1="415" x2="1098" y2="368" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c41a1a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c41a1a" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="edge7" x1="848" y1="336" x2="758" y2="476" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c41a1a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c41a1a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="edge8" x1="720" y1="195" x2="758" y2="476" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c41a1a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c41a1a" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle vignette on right to frame graph -->
  <radialGradient id="vignette" cx="75%" cy="50%" r="55%" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- ── EDGES ─────────────────────────────────────────────────────── -->
  <!-- Pfizer → Sen. Cruz -->
  <line x1="720" y1="195" x2="1020" y2="250" stroke="url(#edge1)" stroke-width="1.5"/>
  <!-- Boeing → Sen. Cruz -->
  <line x1="895" y1="148" x2="1020" y2="250" stroke="url(#edge2)" stroke-width="1.5"/>
  <!-- ExxonMobil → Rep. Smith -->
  <line x1="848" y1="336" x2="968" y2="415" stroke="url(#edge3)" stroke-width="1.5"/>
  <!-- Goldman → Rep. Smith -->
  <line x1="618" y1="345" x2="968" y2="415" stroke="url(#edge4)" stroke-width="1.5"/>
  <!-- Sen. Cruz → Senate Finance -->
  <line x1="1020" y1="250" x2="1098" y2="368" stroke="url(#edge5)" stroke-width="1.5"/>
  <!-- Rep. Smith → Senate Finance -->
  <line x1="968" y1="415" x2="1098" y2="368" stroke="url(#edge6)" stroke-width="1.5"/>
  <!-- ExxonMobil → Commerce Cmte -->
  <line x1="848" y1="336" x2="758" y2="476" stroke="url(#edge7)" stroke-width="1.5"/>
  <!-- Pfizer → Commerce Cmte -->
  <line x1="720" y1="195" x2="758" y2="476" stroke="url(#edge8)" stroke-width="1.5"/>

  <!-- Edge dollar labels -->
  <text x="865" y="213" font-family="monospace" font-size="11" font-weight="bold" fill="#c41a1a">$2.4M</text>
  <text x="942" y="188" font-family="monospace" font-size="11" font-weight="bold" fill="#c41a1a">$1.8M</text>
  <text x="912" y="368" font-family="monospace" font-size="11" font-weight="bold" fill="#c41a1a">$3.1M</text>
  <text x="778" y="385" font-family="monospace" font-size="11" font-weight="bold" fill="#c41a1a">$890K</text>
  <text x="793" y="430" font-family="monospace" font-size="11" font-weight="bold" fill="#c41a1a">$1.2M</text>
  <text x="726" y="352" font-family="monospace" font-size="11" font-weight="bold" fill="#c41a1a">$760K</text>

  <!-- ── NODES ─────────────────────────────────────────────────────── -->

  <!-- Pfizer (blue corp) -->
  <circle cx="720" cy="195" r="70" fill="url(#glow-blue)"/>
  <circle cx="720" cy="195" r="38" fill="#0a0a0a" stroke="#1a6bc4" stroke-width="2"/>
  <text x="720" y="191" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Pfizer</text>
  <text x="720" y="205" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Inc.</text>
  <text x="720" y="218" font-family="monospace" font-size="9" fill="#1a6bc4" text-anchor="middle">CORP</text>

  <!-- Boeing (blue corp) -->
  <circle cx="895" cy="148" r="58" fill="url(#glow-blue)"/>
  <circle cx="895" cy="148" r="30" fill="#0a0a0a" stroke="#1a6bc4" stroke-width="2"/>
  <text x="895" y="144" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Boeing</text>
  <text x="895" y="157" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Co.</text>

  <!-- ExxonMobil (blue corp) -->
  <circle cx="848" cy="336" r="66" fill="url(#glow-blue)"/>
  <circle cx="848" cy="336" r="34" fill="#0a0a0a" stroke="#1a6bc4" stroke-width="2"/>
  <text x="848" y="332" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Exxon</text>
  <text x="848" y="346" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Mobil</text>
  <text x="848" y="359" font-family="monospace" font-size="9" fill="#1a6bc4" text-anchor="middle">CORP</text>

  <!-- Goldman Sachs (blue corp) -->
  <circle cx="618" cy="345" r="62" fill="url(#glow-blue)"/>
  <circle cx="618" cy="345" r="32" fill="#0a0a0a" stroke="#1a6bc4" stroke-width="2"/>
  <text x="618" y="340" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Goldman</text>
  <text x="618" y="354" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Sachs</text>

  <!-- Sen. Cruz (green legislator) -->
  <circle cx="1020" cy="250" r="70" fill="url(#glow-green)"/>
  <circle cx="1020" cy="250" r="36" fill="#0a0a0a" stroke="#2da44e" stroke-width="2"/>
  <text x="1020" y="245" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Sen.</text>
  <text x="1020" y="259" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Cruz</text>
  <text x="1020" y="272" font-family="monospace" font-size="9" fill="#2da44e" text-anchor="middle">R-TX</text>

  <!-- Rep. Smith (green legislator) -->
  <circle cx="968" cy="415" r="66" fill="url(#glow-green)"/>
  <circle cx="968" cy="415" r="34" fill="#0a0a0a" stroke="#2da44e" stroke-width="2"/>
  <text x="968" y="410" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Rep.</text>
  <text x="968" y="424" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Smith</text>
  <text x="968" y="437" font-family="monospace" font-size="9" fill="#2da44e" text-anchor="middle">D-CA</text>

  <!-- Senate Finance (amber committee) -->
  <circle cx="1098" cy="368" r="58" fill="url(#glow-amber)"/>
  <circle cx="1098" cy="368" r="30" fill="#0a0a0a" stroke="#f5a623" stroke-width="2"/>
  <text x="1098" y="362" font-family="monospace" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">Senate</text>
  <text x="1098" y="375" font-family="monospace" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">Finance</text>

  <!-- Commerce Cmte (amber committee) -->
  <circle cx="758" cy="476" r="54" fill="url(#glow-amber)"/>
  <circle cx="758" cy="476" r="28" fill="#0a0a0a" stroke="#f5a623" stroke-width="2"/>
  <text x="758" y="470" font-family="monospace" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">Commerce</text>
  <text x="758" y="483" font-family="monospace" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">Cmte</text>

  <!-- ── LEFT PANEL TEXT ─────────────────────────────────────────────── -->

  <!-- LOBBY.WATCH headline -->
  <text font-family="Georgia, serif" font-size="76" font-weight="900">
    <tspan x="60" y="108" fill="#ffffff">LOBBY</tspan><tspan fill="#c41a1a">.WATCH</tspan>
  </text>

  <!-- Tagline -->
  <text x="62" y="140" font-family="monospace" font-size="17" fill="#666666" letter-spacing="2">Federal Influence Database</text>

  <!-- Red rule -->
  <line x1="60" y1="160" x2="555" y2="160" stroke="#c41a1a" stroke-width="1.5"/>

  <!-- Description -->
  <text x="62" y="198" font-family="Georgia, serif" font-size="22" fill="#cccccc">See who's paying American politicians</text>
  <text x="62" y="228" font-family="Georgia, serif" font-size="22" fill="#cccccc">and what they got in return.</text>

  <!-- Stats -->
  <!-- Stat 1 -->
  <text x="62" y="300" font-family="monospace" font-size="30" font-weight="bold" fill="#c41a1a">300,000+</text>
  <text x="62" y="320" font-family="monospace" font-size="13" fill="#555555">federal lobbying filings</text>

  <!-- Stat 2 -->
  <text x="62" y="372" font-family="monospace" font-size="30" font-weight="bold" fill="#c41a1a">$4.1B+</text>
  <text x="62" y="392" font-family="monospace" font-size="13" fill="#555555">in tracked contributions</text>

  <!-- Stat 3 -->
  <text x="62" y="444" font-family="monospace" font-size="30" font-weight="bold" fill="#c41a1a">535</text>
  <text x="62" y="464" font-family="monospace" font-size="13" fill="#555555">congressional members mapped</text>

  <!-- Legend -->
  <circle cx="62" cy="524" r="6" fill="#0a0a0a" stroke="#1a6bc4" stroke-width="1.5"/>
  <text x="76" y="528" font-family="monospace" font-size="11" fill="#555555">Corp / Org</text>
  <circle cx="152" cy="524" r="6" fill="#0a0a0a" stroke="#2da44e" stroke-width="1.5"/>
  <text x="166" y="528" font-family="monospace" font-size="11" fill="#555555">Legislator</text>
  <circle cx="248" cy="524" r="6" fill="#0a0a0a" stroke="#f5a623" stroke-width="1.5"/>
  <text x="262" y="528" font-family="monospace" font-size="11" fill="#555555">Committee</text>
  <line x1="346" y1="520" x2="372" y2="520" stroke="#c41a1a" stroke-width="1.5"/>
  <text x="380" y="528" font-family="monospace" font-size="11" fill="#555555">Contribution</text>

  <!-- ── BOTTOM BAR ──────────────────────────────────────────────────── -->
  <rect x="0" y="576" width="1200" height="54" fill="rgba(196,26,26,0.07)"/>
  <line x1="0" y1="576" x2="1200" y2="576" stroke="#c41a1a" stroke-width="1" stroke-opacity="0.4"/>

  <text x="60" y="608" font-family="monospace" font-size="13" fill="#444444">
    300,000+ lobbying filings  ·  FEC campaign finance  ·  Congressional votes  ·  Revolving-door tracker
  </text>
  <text x="1140" y="608" font-family="monospace" font-size="14" font-weight="bold" fill="#c41a1a" text-anchor="end">lobby.watch</text>
</svg>
